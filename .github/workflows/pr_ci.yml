name: Pull Requests CI

on:
  pull_request:
    branches:
      - '*'

  workflow_dispatch:

jobs:
  build_linux:
    name: Linux
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        config:
        - { name: "GCC", cc: gcc, cxx: g++ }
        - { name: "clang", cc: clang, cxx: clang++ }
    env:
      CC: ${{ matrix.config.cc }}
      CXX: ${{ matrix.config.cxx }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: Set Environment Variables
        if: ${{ matrix.config.cc == 'gcc' }}
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "INSTALL_REF=${GITHUB_REF##*/}" >> "$GITHUB_ENV"
          echo "INSTALL_NAME=pragtical-${GITHUB_REF##*/}-linux-$(uname -m)-portable" >> "$GITHUB_ENV"
      - name: Python Setup
        uses: actions/setup-python@v6
        with:
          python-version: 3.9
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
      - name: Update Packages
        run: sudo apt-get update
      - name: Install Dependencies
        run: bash scripts/install-dependencies.sh --debug
      - name: Build
        run: |
          bash --version
          bash scripts/build.sh --debug --forcefallback --portable
      - name: Run Tests
        run: |
          source scripts/common.sh
          SDL_VIDEO_DRIVER=dummy ./scripts/run-local "$(get_default_build_dir)" test scripts/lua/tests
      - name: Package
        if: ${{ matrix.config.cc == 'gcc' }}
        run: bash scripts/package.sh --version ${INSTALL_REF} --debug --binary
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        if: ${{ matrix.config.cc == 'gcc' }}
        with:
          name: Linux x86_64
          path: ${{ env.INSTALL_NAME }}.tar.gz

  build_macos:
    name: macOS
    strategy:
      matrix:
        config:
          - arch: x86_64
            image: macos-15-intel
          - arch: arm64
            image: macos-14
    runs-on: ${{ matrix.config.image }}
    env:
      CC: clang
      CXX: clang++
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: System Information
        run: |
          system_profiler SPSoftwareDataType
          bash --version
          gcc -v
          xcodebuild -version
      - name: Set Environment Variables
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "INSTALL_REF=${GITHUB_REF##*/}" >> "$GITHUB_ENV"
          echo "INSTALL_NAME=pragtical-${GITHUB_REF##*/}-macos-${{ matrix.config.arch }}" >> "$GITHUB_ENV"
      - name: Python Setup
        uses: actions/setup-python@v6
        with:
          python-version: 3.9
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
      - name: Install Dependencies
        run: bash scripts/install-dependencies.sh --debug
      - name: Build
        run: |
          bash --version
          bash scripts/build.sh --bundle --debug --forcefallback
      - name: Run Tests
        run: |
          source scripts/common.sh
          builddir="$(get_default_build_dir)"

          if [[ "${{ matrix.config.arch }}" != "x86_64" ]]; then
            SDL_VIDEO_DRIVER=dummy ./scripts/run-local "$builddir" test scripts/lua/tests
            exit 0
          fi

          mkdir -p ci-debug
          {
            echo "builddir=$builddir"
            echo "arch=${{ matrix.config.arch }}"
            sw_vers || true
            uname -a || true
            meson configure "$builddir" | grep -E 'renderer|buildtype|optimization|wrap_mode|b_lto|b_pgo' || true
            env | sort | grep -E 'SDL|PRAGTICAL|MACOSX|ARCH|CC|CXX|MESON|GITHUB' || true
            otool -L "$builddir/src/pragtical" || true
          } | tee ci-debug/environment.txt

          set +e
          SDL_VIDEO_DRIVER=dummy ./scripts/run-local "$builddir" test scripts/lua/tests \
            2>&1 | tee ci-debug/run-local.txt
          run_local_status="${PIPESTATUS[0]}"
          set -e
          if [[ "$run_local_status" == "0" ]]; then
            exit 0
          fi

          meson compile -C "$builddir"

          rm -rf .run
          mkdir -p .run/bin .run/share/pragtical
          cp "$builddir/src/pragtical" .run/bin
          for module_name in core compat plugins colors fonts; do
            cp -r "data/$module_name" .run/share/pragtical
          done
          if [ -d "subprojects/widget" ]; then
            cp -a "subprojects/widget" .run/share/pragtical
          fi
          if [ -d "subprojects/colors" ]; then
            cp -a "subprojects/colors/colors" .run/share/pragtical
          fi
          if [ -d "subprojects/plugins" ]; then
            cp -a "subprojects/plugins/plugins/"language_* .run/share/pragtical/plugins
          fi
          cp "$builddir/start.lua" .run/share/pragtical/core
          cp -a .run/share/pragtical/* .run/bin

          export SDL_VIDEO_DRIVER=dummy
          export PRAGTICAL_USERDIR="$(cd .run && pwd -P)"

          set +e
          lldb --batch \
            -o "run test scripts/lua/tests" \
            -o "bt all" \
            -o "thread backtrace all" \
            -o "register read" \
            -o "image list" \
            -- .run/bin/pragtical 2>&1 | tee ci-debug/lldb.txt
          lldb_status="${PIPESTATUS[0]}"
          set -e
          if grep -Eq 'stop reason = signal|EXC_BAD_ACCESS|Segmentation fault' ci-debug/lldb.txt; then
            exit 139
          fi
          if grep -Eq 'exited with status = 0' ci-debug/lldb.txt; then
            exit 0
          fi
          exit "$lldb_status"
      - name: Collect macOS x86_64 Test Diagnostics
        if: ${{ failure() && matrix.config.arch == 'x86_64' }}
        run: |
          mkdir -p ci-debug
          cp -R .run ci-debug/run-local 2>/dev/null || true
          cp ~/Library/Logs/DiagnosticReports/*pragtical* ci-debug/ 2>/dev/null || true
          find ci-debug -maxdepth 4 -type f -print
      - name: Upload macOS x86_64 Test Diagnostics
        if: ${{ failure() && matrix.config.arch == 'x86_64' }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-test-diagnostics
          path: ci-debug
      - name: Create DMG Image
        run: bash scripts/package.sh --version ${INSTALL_REF} --debug --dmg
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: macOS DMG ${{ matrix.config.arch }}
          path: ${{ env.INSTALL_NAME }}.dmg

  build_windows_msys2:
    name: Windows
    runs-on: windows-2022
    strategy:
      matrix:
        config:
          # - {msystem: MINGW32, arch: i686, target: x86}
          - {msystem: MINGW64, arch: x86_64, target: x64}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.config.msystem }}
          install: >-
            base-devel
            git
            zip
            unzip
            mingw-w64-${{ matrix.config.arch }}-gcc
            mingw-w64-${{ matrix.config.arch }}-python-pip
            mingw-w64-${{ matrix.config.arch }}-ninja
            mingw-w64-${{ matrix.config.arch }}-cmake
            mingw-w64-${{ matrix.config.arch }}-ca-certificates
            mingw-w64-${{ matrix.config.arch }}-gdb
            mingw-w64-${{ matrix.config.arch }}-ntldd
      - name: Setup Meson
        run: |
          pip install meson --break-system-packages
      - name: Set Environment Variables
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "INSTALL_REF=${GITHUB_REF##*/}" >> "$GITHUB_ENV"
          if [[ "${MSYSTEM}" == "MINGW64" ]]; then
            echo "INSTALL_NAME=pragtical-${GITHUB_REF##*/}-windows-x86_64" >> "$GITHUB_ENV"
          else
            echo "INSTALL_NAME=pragtical-${GITHUB_REF##*/}-windows-i686" >> "$GITHUB_ENV"
          fi
      - name: Install Dependencies
        if: false
        run: bash scripts/install-dependencies.sh --debug
      - name: Build
        run: |
          bash --version
          bash scripts/build.sh --debug --forcefallback
      - name: Run Tests
        run: |
          source scripts/common.sh
          builddir="$(get_default_build_dir)"
          mkdir -p ci-debug
          {
            echo "builddir=$builddir"
            echo "MSYSTEM=$MSYSTEM"
            echo "OSTYPE=$OSTYPE"
            echo "PATH=$PATH"
            meson configure "$builddir" | grep -E 'renderer|buildtype|optimization|wrap_mode|b_lto|b_pgo' || true
            env | sort | grep -E 'SDL|PRAGTICAL|MSYSTEM|MINGW|OSTYPE|ARCH|CC|CXX|MESON|GITHUB|RUNNER' || true
            ntldd "$builddir/src/pragtical.exe" || true
          } | tee ci-debug/environment.txt

          set +e
          SDL_VIDEO_DRIVER=dummy ./scripts/run-local "$builddir" test scripts/lua/tests \
            2>&1 | tee ci-debug/run-local.txt
          run_local_status="${PIPESTATUS[0]}"
          set -e
          if [[ "$run_local_status" == "0" ]]; then
            exit 0
          fi

          export SDL_VIDEO_DRIVER=dummy
          export PRAGTICAL_USERDIR="$(cd .run && pwd -P)"
          gdb -batch \
            -ex "set pagination off" \
            -ex "set confirm off" \
            -ex "run" \
            -ex "info threads" \
            -ex "thread apply all bt full" \
            --args .run/bin/pragtical.exe test scripts/lua/tests \
            2>&1 | tee ci-debug/gdb.txt
          exit "$run_local_status"
      - name: Upload Windows Test Diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-msys2-test-diagnostics
          path: ci-debug
      - name: Package
        run: bash scripts/package.sh --version ${INSTALL_REF} --debug --binary
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Windows (MSYS) ${{ matrix.config.target }}
          path: ${{ env.INSTALL_NAME }}.zip

  build_windows_msvc:
    name: Windows (MSVC)
    runs-on: windows-2022
    strategy:
      matrix:
        arch:
          # - { target: x86, name: i686 }
          - { target: x64, name: x86_64 }
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: Setup Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch.target }}
      - name: Python Setup
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install meson and ninja
        run: pip install meson ninja
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
      - name: Set up environment variables
        run: |
          "INSTALL_NAME=pragtical-$($env:GITHUB_REF -replace ".*/")-windows-msvc-${{ matrix.arch.name }}" >> $env:GITHUB_ENV
          "INSTALL_REF=$($env:GITHUB_REF -replace ".*/")" >> $env:GITHUB_ENV
          "LUA_SUBPROJECT_PATH=subprojects/lua-5.4.6" >> $env:GITHUB_ENV
      - name: Configure
        run: |
          meson setup --wrap-mode=forcefallback -Dppm=false build
      - name: Build
        run: |
          meson compile -j 1 -C build
          meson install -C build --destdir="../pragtical"
      - name: Package
        run: |
          Remove-Item -Recurse -Force -Path "pragtical/lib","pragtical/include"
          Compress-Archive -Path pragtical -DestinationPath "$env:INSTALL_NAME.zip"
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Windows (MSVC) ${{ matrix.arch.target }}
          path: ${{ env.INSTALL_NAME }}.zip
