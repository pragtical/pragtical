name: Pull Requests CI

on:
  pull_request:
    branches:
      - '*'

  workflow_dispatch:

jobs:
  build_linux:
    name: Linux
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        config:
        - { name: "GCC", cc: gcc, cxx: g++, package: false, test: true }
        - { name: "Zig x86_64", cc: gcc, cxx: g++, zig: true, arch: x86_64, package: true, test: true }
        - { name: "Zig aarch64", cc: gcc, cxx: g++, zig: true, arch: aarch64, package: false, test: false }
    env:
      CC: ${{ matrix.config.cc }}
      CXX: ${{ matrix.config.cxx }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: Set Environment Variables
        if: ${{ matrix.config.package }}
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "INSTALL_REF=${GITHUB_REF##*/}" >> "$GITHUB_ENV"
          echo "INSTALL_NAME=pragtical-${GITHUB_REF##*/}-linux-$(uname -m)-portable" >> "$GITHUB_ENV"
      - name: Python Setup
        uses: actions/setup-python@v6
        with:
          python-version: 3.9
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
      - name: Setup Zig
        if: ${{ matrix.config.zig }}
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Update Packages
        run: sudo apt-get update
      - name: Install Dependencies
        run: bash scripts/install-dependencies.sh --debug
      - name: Build
        if: ${{ !matrix.config.zig }}
        run: |
          bash --version
          bash scripts/build.sh --debug --forcefallback --portable
      - name: Build with Zig
        if: ${{ matrix.config.zig }}
        run: |
          bash --version
          bash scripts/build.sh --debug --forcefallback --portable \
            --cross-platform linux \
            --cross-arch ${{ matrix.config.arch }} \
            --cross-file resources/cross/linux-zig-${{ matrix.config.arch }}.ini
      - name: Run Tests
        if: ${{ matrix.config.test }}
        run: |
          source scripts/common.sh
          SDL_VIDEO_DRIVER=dummy ./scripts/run-local "$(get_default_build_dir)" test scripts/lua/tests
      - name: Package
        if: ${{ matrix.config.package }}
        run: bash scripts/package.sh --version ${INSTALL_REF} --debug --binary
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        if: ${{ matrix.config.package }}
        with:
          name: Linux x86_64
          path: ${{ env.INSTALL_NAME }}.tar.gz

  build_macos:
    name: macOS
    strategy:
      matrix:
        config:
          - arch: x86_64
            image: macos-15-intel
          - arch: arm64
            image: macos-14
    runs-on: ${{ matrix.config.image }}
    env:
      CC: clang
      CXX: clang++
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: System Information
        run: |
          system_profiler SPSoftwareDataType
          bash --version
          gcc -v
          xcodebuild -version
      - name: Set Environment Variables
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "INSTALL_REF=${GITHUB_REF##*/}" >> "$GITHUB_ENV"
          echo "INSTALL_NAME=pragtical-${GITHUB_REF##*/}-macos-${{ matrix.config.arch }}" >> "$GITHUB_ENV"
      - name: Python Setup
        uses: actions/setup-python@v6
        with:
          python-version: 3.9
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
      - name: Install Dependencies
        run: bash scripts/install-dependencies.sh --debug
      - name: Build
        run: |
          bash --version
          bash scripts/build.sh --bundle --debug --forcefallback
      - name: Run Tests
        run: |
          source scripts/common.sh
          SDL_VIDEO_DRIVER=dummy ./scripts/run-local "$(get_default_build_dir)" test scripts/lua/tests
      - name: Create DMG Image
        run: bash scripts/package.sh --version ${INSTALL_REF} --debug --dmg
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: macOS DMG ${{ matrix.config.arch }}
          path: ${{ env.INSTALL_NAME }}.dmg

  build_windows_msys2:
    name: Windows
    runs-on: windows-2022
    strategy:
      matrix:
        config:
          # - {msystem: MINGW32, arch: i686, target: x86}
          - {msystem: MINGW64, arch: x86_64, target: x64}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.config.msystem }}
          install: >-
            base-devel
            git
            zip
            unzip
            mingw-w64-${{ matrix.config.arch }}-gcc
            mingw-w64-${{ matrix.config.arch }}-python-pip
            mingw-w64-${{ matrix.config.arch }}-ninja
            mingw-w64-${{ matrix.config.arch }}-cmake
            mingw-w64-${{ matrix.config.arch }}-ca-certificates
            mingw-w64-${{ matrix.config.arch }}-ntldd
      - name: Setup Meson
        run: |
          pip install meson --break-system-packages
      - name: Set Environment Variables
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "INSTALL_REF=${GITHUB_REF##*/}" >> "$GITHUB_ENV"
          if [[ "${MSYSTEM}" == "MINGW64" ]]; then
            echo "INSTALL_NAME=pragtical-${GITHUB_REF##*/}-windows-x86_64" >> "$GITHUB_ENV"
          else
            echo "INSTALL_NAME=pragtical-${GITHUB_REF##*/}-windows-i686" >> "$GITHUB_ENV"
          fi
      - name: Install Dependencies
        if: false
        run: bash scripts/install-dependencies.sh --debug
      - name: Build
        run: |
          bash --version
          bash scripts/build.sh --debug --forcefallback
      - name: Run Tests
        run: |
          source scripts/common.sh
          SDL_VIDEO_DRIVER=dummy ./scripts/run-local "$(get_default_build_dir)" test scripts/lua/tests
      - name: Package
        run: bash scripts/package.sh --version ${INSTALL_REF} --debug --binary
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Windows (MSYS) ${{ matrix.config.target }}
          path: ${{ env.INSTALL_NAME }}.zip

  build_windows_msvc:
    name: Windows (MSVC)
    runs-on: windows-2022
    strategy:
      matrix:
        arch:
          # - { target: x86, name: i686 }
          - { target: x64, name: x86_64 }
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: Setup Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch.target }}
      - name: Python Setup
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install meson and ninja
        run: pip install meson ninja
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
      - name: Set up environment variables
        run: |
          "INSTALL_NAME=pragtical-$($env:GITHUB_REF -replace ".*/")-windows-msvc-${{ matrix.arch.name }}" >> $env:GITHUB_ENV
          "INSTALL_REF=$($env:GITHUB_REF -replace ".*/")" >> $env:GITHUB_ENV
          "LUA_SUBPROJECT_PATH=subprojects/lua-5.4.6" >> $env:GITHUB_ENV
      - name: Configure
        run: |
          meson setup --wrap-mode=forcefallback -Dppm=false build
      - name: Build
        run: |
          meson compile -j 1 -C build
          meson install -C build --destdir="../pragtical"
      - name: Package
        run: |
          Remove-Item -Recurse -Force -Path "pragtical/lib","pragtical/include"
          Compress-Archive -Path pragtical -DestinationPath "$env:INSTALL_NAME.zip"
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Windows (MSVC) ${{ matrix.arch.target }}
          path: ${{ env.INSTALL_NAME }}.zip
